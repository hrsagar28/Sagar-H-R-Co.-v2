<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover lets us read env(safe-area-inset-*) on
         notched iPhones so fixed UI (WhatsApp float, etc.) can sit above
         the iOS home indicator instead of being clipped by it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#06070a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F2F2F0" media="(prefers-color-scheme: light)" />

    <!-- Google Analytics (Loaded Dynamically via CookieConsent) -->

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preload" href="/fonts/fraunces-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/fraunces-latin-400-italic.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/fraunces-latin-500-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link
      rel="preload"
      href="/fonts/plus-jakarta-sans-latin-500-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <meta name="author" content="Sagar H R & Co." />
    <meta name="geo.region" content="IN-KA" />
    <meta name="geo.placename" content="Mysuru, Karnataka" />

    <meta property="og:site_name" content="Sagar H R & Co." />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <style>
      /* Keep this background in sync with STARFIELD_BG in components/home/StarField.tsx. */
      #preload-hero {
        position: fixed;
        inset: 0;
        z-index: 2;
        display: flex;
        align-items: flex-start;
        min-height: 100vh;
        padding: 8rem 1rem 2rem;
        pointer-events: none;
        overflow: hidden;
        background: #06070a;
        color: #fff;
      }

      #preload-hero-inner {
        width: min(100%, 80rem);
        margin: 3rem auto 0;
      }

      #preload-hero-title {
        font-family: Fraunces, Georgia, serif;
        font-weight: 300;
        line-height: 1;
        letter-spacing: 0;
      }

      #preload-hero-title span {
        display: block;
        font-size: 12vw;
        opacity: 1;
        transform: none;
      }

      #preload-hero-title em {
        font-style: italic;
        font-weight: 400;
      }

      @media (min-width: 768px) {
        #preload-hero {
          align-items: center;
          padding: 5rem 1.5rem 0;
        }

        #preload-hero-inner {
          margin-top: 0;
        }

        #preload-hero-title span {
          font-size: 7rem;
        }
      }

      @media (min-width: 1024px) {
        #preload-hero-title span {
          font-size: 9rem;
        }
      }
    </style>
  </head>

  <body class="overflow-x-hidden bg-[#F2F2F0] text-[#111111]">
    <div id="preload-hero" aria-hidden="true">
      <div id="preload-hero-inner">
        <div id="preload-hero-title">
          <span>Audit.</span>
          <span>Taxation.</span>
          <span><em>Advisory.</em></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
