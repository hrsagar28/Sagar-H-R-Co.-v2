# MNT-6: pin the Node version so Netlify's build matches package.json engines
# (20.x) and CI, instead of relying on Netlify's shifting default.
[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200
  force = true

[[redirects]]
  from = "/faq"
  to = "/faqs"
  status = 301

# Retired Aug-2025 insight articles (replaced by the 2025-Act refresh).
# 301 to the topical successor where one exists, else to the insights index,
# so old inbound links and search results don't 404.
[[redirects]]
  from = "/insights/new-income-tax-bill-2025"
  to = "/insights/income-tax-act-2025-in-force"
  status = 301

[[redirects]]
  from = "/insights/gst-reforms-2.0"
  to = "/insights/gst-2-0-one-year-on-msmes"
  status = 301

[[redirects]]
  from = "/insights/tds-tcs-changes-2025"
  to = "/insights/tds-new-act-renumbering-thresholds"
  status = 301

[[redirects]]
  from = "/insights/house-property-income"
  to = "/insights"
  status = 301

[[redirects]]
  from = "/insights/gst-compliance-updates"
  to = "/insights"
  status = 301

[[redirects]]
  from = "/insights/sp-rating-upgrade"
  to = "/insights"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*"
  [headers.values]
    # Regenerate the style-src-elem hash whenever the inline <style> block in index.html changes.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # SEC-7: block Adobe cross-domain policy files, and register a modern
    # Reporting-Endpoints group so `report-to` works alongside legacy report-uri.
    X-Permitted-Cross-Domain-Policies = "none"
    Reporting-Endpoints = 'csp-endpoint="/.netlify/functions/csp-report"'
    # CF-5: 'wasm-unsafe-eval' + worker-src let the Botpoison proof-of-work
    # challenge (WASM in a blob worker) run; without them challenge() throws.
    # SEC-7: frame-ancestors 'none' now matches X-Frame-Options: DENY (no
    # contradiction); report-to mirrors report-uri for modern browsers.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://www.googletagmanager.com; worker-src 'self' blob:; style-src 'self'; style-src-elem 'self' 'sha256-Rx8sbJNM1PHpI2EpyvoJsMjRmGaPTL1bc7kw0VlR/K4='; style-src-attr 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://formsubmit.co https://api.botpoison.com; frame-src 'self' https://www.google.com https://maps.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; report-uri /.netlify/functions/csp-report; report-to csp-endpoint; upgrade-insecure-requests;"
    X-Frame-Options = "DENY"

