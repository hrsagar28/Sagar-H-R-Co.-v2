name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Upload Playwright and Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-artifacts
          path: |
            playwright-report/
            test-results/
            lighthouse-results/
          if-no-files-found: ignore
